name: Lint, Test, Publish and Release

permissions:
  checks: write
  contents: write
  id-token: write # Required for npm OIDC Trusted Publishing

on:
  push:
    tags:
      - "v*"

jobs:
  common:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
            fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: 'https://registry.npmjs.org'
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm lint

      - name: Run prepare
        run: pnpm dev:prepare

      - name: Run tests
        run: pnpm test

      - name: Run prepack
        run: pnpm prepack

      # npm Trusted Publishing uses OIDC — no token needed.
      # Configure once: npm trust github nuxt-disqus --file ltpr.yml --repo modbender/nuxt-disqus --allow-publish
      - name: Publish to npm (OIDC Trusted Publishing)
        shell: bash
        run: pnpm publish --access public --no-git-checks --provenance
        env:
          NPM_CONFIG_PROVENANCE: true

      - name: Run github release
        run: npx --yes changelogithub@latest
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
